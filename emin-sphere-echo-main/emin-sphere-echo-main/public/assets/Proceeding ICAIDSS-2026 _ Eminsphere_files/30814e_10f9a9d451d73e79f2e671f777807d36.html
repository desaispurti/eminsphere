*{

body{
    background:#2f332d;
    color:#fff;
}

/* Header */
header{
    background:#1e1e1e;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:600;
}

/* Container */
.container{
    max-width:1200px;
    margin:40px auto;
    padding:20px;
    animation:fadeIn 1.2s ease-in;
}

/* Title */
.title{
    text-align:center;
    font-size:26px;
    margin-bottom:20px;
}

/* Description */
.description{
    max-width:900px;
    margin:0 auto 40px;
    line-height:1.7;
    font-size:15px;
    text-align:center;
    color:#ddd;
}

/* Grid */
.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px,1fr));
    gap:25px;
}

/* Card */
.video-card{
    background:#1c1c1c;
    padding:10px;
    border-radius:8px;
    transition:0.3s;
}

.video-card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 18px rgba(255,255,255,0.25);
}

.video-card iframe{
    width:100%;
    height:190px;
    border-radius:6px;
    border:none;
}

/* Footer */
footer{
    background:#1e1e1e;
    margin-top:60px;
    padding:30px;
    text-align:center;
    font-size:14px;
    color:#ccc;
}

/* Animation */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
